<!--
  Herald MCClientMCP Logo

  设计：
    - 中央：等距投影立方体（Minecraft 像素方块），带"双眼"表示"客户端观测"
    - 眼睛用紫蓝渐变双点表示 AI 视角在观察客户端
    - 立方体外两道弧线 → 表示"客户端在线 + 被操控"
    - 外圈：与 Herald 同款的印鉴断口环
    - 渐变色：c4b5fd → a78bfa → 38bdf8（Herald 系列统一）
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="hgTop" x1="20" y1="18" x2="44" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="hgRing" cx="50%" cy="50%" r="50%">
      <stop offset="0.65" stop-color="transparent"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <!-- 印鉴外环 -->
  <circle cx="32" cy="32" r="28" fill="url(#hgRing)"/>
  <path d="M 32 4 A 28 28 0 0 1 60 32 M 60 32 A 28 28 0 0 1 32 60 M 32 60 A 28 28 0 0 1 4 32 M 4 32 A 28 28 0 0 1 32 4"
        stroke="url(#hg)" stroke-width="1.6" stroke-linecap="round"
        stroke-dasharray="36 6" fill="none"/>

  <!-- 内圈细环 -->
  <circle cx="32" cy="32" r="22.5" fill="none" stroke="url(#hg)" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- 操控弧线（左上 + 右下） -->
  <path d="M 12 26 A 20 20 0 0 1 26 12"
        stroke="url(#hg)" stroke-width="1.2" stroke-linecap="round"
        stroke-opacity="0.7" fill="none"/>
  <path d="M 52 38 A 20 20 0 0 1 38 52"
        stroke="url(#hg)" stroke-width="1.2" stroke-linecap="round"
        stroke-opacity="0.7" fill="none"/>

  <!-- 等距立方体 -->
  <!-- 顶面 -->
  <path d="M 32 20 L 44 26.5 L 32 33 L 20 26.5 Z"
        fill="url(#hgTop)" fill-opacity="0.95"
        stroke="url(#hg)" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 左面 -->
  <path d="M 20 26.5 L 32 33 L 32 46 L 20 39.5 Z"
        fill="#a78bfa" fill-opacity="0.16"
        stroke="url(#hg)" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 右面 -->
  <path d="M 44 26.5 L 32 33 L 32 46 L 44 39.5 Z"
        fill="#38bdf8" fill-opacity="0.10"
        stroke="url(#hg)" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- AI 眼睛（正面/左面上的两个发光点） -->
  <circle cx="25" cy="34.5" r="2" fill="#0a0a0c"/>
  <circle cx="25" cy="34.5" r="1.1" fill="#c4b5fd"/>
  <circle cx="29" cy="36.5" r="2" fill="#0a0a0c"/>
  <circle cx="29" cy="36.5" r="1.1" fill="#38bdf8"/>
</svg>
